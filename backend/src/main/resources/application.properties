# ─────────────────────────────────────────────────────
#  GreenLeaf Paper Plates — Application Configuration
# ─────────────────────────────────────────────────────

spring.application.name=paperplate

# ── Server ────────────────────────────────────────────
server.port=8080

# ── Static Files (serve the frontend) ─────────────────
# Place index.html + style.css in src/main/resources/static/
spring.web.resources.static-locations=classpath:/static/
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=true

# ── Database (H2 in-memory for local dev) ─────────────
# Comment out H2 section and enable MySQL for production
spring.datasource.url=jdbc:h2:mem:paperplatedb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ── Database (MySQL / AWS RDS — uncomment for production) ──
# spring.datasource.url=jdbc:mysql://${RDS_HOSTNAME}:${RDS_PORT}/${RDS_DB_NAME}?useSSL=true&requireSSL=false&serverTimezone=Asia/Kolkata
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.datasource.username=${RDS_USERNAME}
# spring.datasource.password=${RDS_PASSWORD}
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ── JPA ───────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ── Email (Gmail SMTP) ────────────────────────────────
# IMPORTANT: Use an App Password, NOT your Gmail login password.
# Generate at: https://myaccount.google.com/apppasswords
# Steps: Google Account → Security → 2-Step Verification → App Passwords
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=nagamahendram098@gmail.com
spring.mail.password=write_your_own_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ── Async (for email sending) ─────────────────────────
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=5
spring.task.execution.pool.queue-capacity=100

# ── Logging ───────────────────────────────────────────
logging.level.com.greenleaf=INFO
logging.level.org.springframework.mail=DEBUG
